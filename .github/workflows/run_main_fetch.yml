name: Автоматическое обновление данных подписок

on:
  schedule:
    - cron: "0 1 * * *"  # Запускать каждый день в 01:00 UTC
  workflow_dispatch: # Разрешить ручной запуск из интерфейса GitHub Actions

jobs:
  update-subscriptions: # Исправленный идентификатор jobs - используем латиницу и дефисы
    runs-on: ubuntu-latest

    steps:
      # 1. (Checkout repository code)
      - name: Шаг 1: Извлечение кода репозитория
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # Для полной истории коммитов

      # 2. (Set up Python environment)
      - name: Шаг 2: Настройка Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.12 # Укажите вашу версию Python

      # 3. (Install dependencies)
      - name: Шаг 3: Установка зависимостей
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # 4. (Run main.py)
      - name: Шаг 4: Запуск скрипта сбора подписок main.py
        run: python main.py

      # 5. (Clean up __pycache__)
      - name: Шаг 5: Очистка __pycache__
        run: |
          find . -name "__pycache__" -type d -exec rm -rf {} +

      # 6. Проверка статуса Git (Check Git status for debugging)
      - name: Шаг 6: Проверка статуса Git
        run: git status

      # 7. (Commit and push generated files back to repository)
      - name: Шаг 7: Коммит и отправка изменений
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions Bot" # Более информативное имя бота
          git pull origin master --rebase # Использовать rebase вместо merge для более чистой истории
          git add .
          git commit -m "♻️ $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S') Автоматически обновлены подписки" # Более понятное сообщение коммита
          git push origin master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
